<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pricing - ComplianceAI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #3498db;
      --secondary: #f1c40f;
      --font: 'Open Sans', sans-serif;
      --radius: 10px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font); line-height: 1.6; color: #333; }
    .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
    header { padding: 16px 0; background: var(--primary); color: white; }
    header nav { display: flex; justify-content: space-between; align-items: center; }
    header .logo { font-size: 1.5rem; font-weight: 700; }
    .page { padding: 80px 0; }
    .page h1 { font-size: 2.5rem; color: var(--primary); margin-bottom: 24px; }
    .page p { font-size: 1.1rem; max-width: 700px; }
    footer { padding: 32px 0; text-align: center; background: var(--primary); color: white; }
    @media (max-width: 768px) {
      .page h1 { font-size: 1.8rem; }
    }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <nav>
        <div class="logo">ComplianceAI</div>
      </nav>
    </div>
  </header>
  <main>
    <section class="page">
      <div class="container">
        <h1>Pricing</h1>
        <p>A FinTech compliance automation platform designed to streamline regulatory compliance for financial institutions</p>
      </div>
    </section>
  </main>
  <footer>
    <div class="container">
      <p>&copy; 2026 ComplianceAI. All rights reserved.</p>
    </div>
  </footer>
</body>
</html>
